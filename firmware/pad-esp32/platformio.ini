[env:pad_esp32]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
extra_scripts = ../../tools/set_version_flag.py

build_flags =
  -I ../../shared/include
  -I ../console-esp32/src
  -DPAD_USB_HOST=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DFW_TARGET='"pad-esp32"'

; No-USB variant for ESP32-D — tests WiFi pairing without physical toypad.
; LED feedback is printed to Serial instead of sent to the toypad.
[env:pad_esp32_nousb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1

build_flags =
  -I ../../shared/include
  -I ../console-esp32/src
  -DPAD_USB_HOST=0
