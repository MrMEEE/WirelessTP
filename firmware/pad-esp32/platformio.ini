[env:pad_esp32]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200

build_flags =
  -I ../../shared/include
  -DPAD_USB_HOST=1

; No-USB variant for ESP32-D — tests WiFi pairing without physical toypad.
; LED feedback is printed to Serial instead of sent to the toypad.
[env:pad_esp32_nousb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
  -I ../../shared/include
  -DPAD_USB_HOST=0
